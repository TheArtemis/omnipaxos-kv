cluster_name = "local-proxy"
nodes = [1, 2, 3]
node_addrs = ["127.0.0.1:8001", "127.0.0.1:8002", "127.0.0.1:8003"]
proxy_listen_address = "0.0.0.0"
proxy_listen_port = 9000
adaptive_deadline = true
default_deadline = 1000
metrics_filepath = "./logs/metrics.json"
telemetry = "yes"

[clock]
drift_rate = 50
uncertainty_bound = 1000
sync_freq = 100
