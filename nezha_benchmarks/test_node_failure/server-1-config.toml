location = "local-1"
server_id = 1
num_clients = 2 # Hardcoded number of direct client connections to wait for
listen_address = "127.0.0.1"
listen_port = 8001
proxy_address = "127.0.0.1:9000"
use_proxy = true
adaptive_deadline = true
default_deadline = 400000
failure_injection = false
failure_probability = 0.2
failure_check_interval_ms = 1000
failure_downtime_ms = 5000
failure_max_events = 1
output_filepath = "./logs/server-1.json"

[owd]
default_value = 1000
percentile = 0.95
window_size = 1000

[clock]
drift_rate = 50
uncertainty_bound = 1000
sync_freq = 100
