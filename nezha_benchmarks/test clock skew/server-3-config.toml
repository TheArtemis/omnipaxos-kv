location = "local-3"
server_id = 3
num_clients = 1 # Hardcoded number of client connections to wait for
listen_address = "127.0.0.1"
listen_port = 8003
proxy_address = "127.0.0.1:9000"
use_proxy = true
adaptive_deadline = false
default_deadline = 1000
failure_injection = false
failure_probability = 0.0
failure_check_interval_ms = 1000
failure_downtime_ms = 0
failure_max_events = 0
output_filepath = "./logs/server-3.json"

[clock]
drift_rate = 250
uncertainty_bound = 1000
sync_freq = 100
